<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="api-base" content="/api">
<title>Admin Panel — Reccos Capital</title>
<style>
  :root {
    --bg: #0a0e1a; --surface: #0f1629; --border: #1e2d4a;
    --accent: #3b82f6; --accent2: #06b6d4;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    --text: #e2e8f0; --muted: #64748b; --card: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; min-height: 100vh; }

  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 1.4rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 1rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-item { display: flex; align-items: center; gap: .75rem; padding: .7rem 1.5rem; color: var(--muted); font-size: .88rem; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; border-left: 3px solid transparent; }
  .nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(59,130,246,.08); border-left-color: var(--accent); }
  .sidebar-footer { padding: 1.5rem; border-top: 1px solid var(--border); margin-top: auto; }
  .logout-btn { width: 100%; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: #ef4444; padding: .5rem; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }
  .topbar-title { font-size: 1.1rem; font-weight: 600; }
  .content { flex: 1; overflow-y: auto; padding: 2rem; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .card-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: .95rem; font-weight: 600; }
  .card-body { padding: 1.5rem; }

  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .stat-label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
  .stat-value { font-size: 2rem; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: .73rem; color: var(--muted); font-weight: 600; padding: .6rem 1rem; border-bottom: 1px solid var(--border); text-transform: uppercase; }
  td { padding: .7rem 1rem; font-size: .87rem; border-bottom: 1px solid rgba(255,255,255,.04); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .badge { padding: .2rem .6rem; border-radius: 999px; font-size: .72rem; font-weight: 600; }
  .badge-green { background: rgba(16,185,129,.12); color: var(--green); }
  .badge-red { background: rgba(239,68,68,.12); color: var(--red); }
  .badge-blue { background: rgba(59,130,246,.12); color: var(--accent); }
  .badge-yellow { background: rgba(245,158,11,.12); color: var(--yellow); }
  .text-muted { color: var(--muted); }
  .text-green { color: var(--green); }

  .btn { padding: .45rem 1rem; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .2s; border: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-sm { padding: .3rem .7rem; font-size: .78rem; }
  .btn-danger-sm { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: var(--red); }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  .tab { padding: .75rem 1.5rem; font-size: .9rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; width: 100%; max-width: 440px; margin: 1rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .4rem; font-weight: 600; }
  .form-group input, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .7rem 1rem; border-radius: 8px; font-size: .9rem; outline: none; }

  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid var(--border); padding: 1rem 1.5rem; border-radius: 10px; font-size: .9rem; z-index: 9999; opacity: 0; transform: translateY(10px); transition: all .3s; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(16,185,129,.4); color: var(--green); }
  .toast.error { border-color: rgba(239,68,68,.4); color: var(--red); }

  @media(max-width:900px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">⬡ Reccos Admin</div>
  <nav style="padding:1rem 0;">
    <a href="/admin" class="nav-item active">🛡️ &nbsp;Dashboard</a>
    <a href="/subscriber/" class="nav-item">💼 &nbsp;Subscriber Portal</a>
    <a href="/" class="nav-item">🌐 &nbsp;Public Site</a>
  </nav>
  <div class="sidebar-footer">
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem;" id="admin-user-email">—</div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Admin Panel</div>
    <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ New User</button>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="grid-4" style="margin-bottom:2rem;">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Users</div>
        <div class="stat-value text-green" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Waitlist</div>
        <div class="stat-value" style="color:var(--accent);" id="stat-waitlist">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Trades Today</div>
        <div class="stat-value" id="stat-trades">—</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-btn-users" onclick="switchTab('users', this)">Users</div>
      <div class="tab" id="tab-btn-waitlist" onclick="switchTab('waitlist', this)">Waitlist</div>
    </div>

    <!-- Users panel -->
    <div id="tab-users" class="tab-panel active">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Platform Users</span>
          <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Add User</button>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr><th>Email</th><th>Role</th><th>Status</th><th>2FA</th><th>Joined</th><th>Last Login</th><th>Actions</th></tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="7" class="text-muted" style="text-align:center;padding:2rem;">Loading users…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Waitlist panel -->
    <div id="tab-waitlist" class="tab-panel">
      <div class="card">
        <div class="card-header"><span class="card-title" id="waitlist-card-title">Beta Waitlist</span></div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr><th>#</th><th>Email</th><th>Signed Up</th><th>Action</th></tr>
            </thead>
            <tbody id="waitlist-tbody">
              <tr><td colspan="4" class="text-muted" style="text-align:center;padding:2rem;">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create User Modal -->
<div class="modal-backdrop" id="create-modal" style="display:none;align-items:center;justify-content:center;">
  <div class="modal">
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;">Create New User</div>
    <div id="create-err" style="display:none;color:var(--red);font-size:.85rem;margin-bottom:1rem;"></div>
    <div id="create-ok" style="display:none;padding:1rem;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:8px;font-size:.85rem;color:var(--green);margin-bottom:1rem;"></div>
    <form onsubmit="createUser(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="new-email" placeholder="user@example.com" required>
      </div>
      <div class="form-group">
        <label>Password (leave blank to auto-generate)</label>
        <input type="password" id="new-pw" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="new-role">
          <option value="subscriber">Subscriber</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:1.5rem;">
        <button type="button" class="btn btn-ghost" style="flex:1;" onclick="closeCreateModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="flex:1;" id="create-btn">Create User</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = document.querySelector('meta[name="api-base"]').content;

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', 3500);
}

async function logout() {
  await fetch(API_BASE + '/auth/logout', {method:'POST'});
  window.location.href = '/login';
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function openCreateModal() {
  document.getElementById('create-err').style.display = 'none';
  document.getElementById('create-ok').style.display = 'none';
  document.getElementById('new-email').value = '';
  document.getElementById('new-pw').value = '';
  document.getElementById('create-modal').style.display = 'flex';
}

function closeCreateModal() {
  document.getElementById('create-modal').style.display = 'none';
}

function userRowHtml(u) {
  const roleBadge = u.role === 'admin'
    ? '<span class="badge badge-yellow">Admin</span>'
    : '<span class="badge badge-blue">Subscriber</span>';
  const statusBadge = u.is_active
    ? '<span class="badge badge-green">Active</span>'
    : '<span class="badge badge-red">Disabled</span>';
  const totpBadge = u.totp_enabled
    ? '<span class="badge badge-green">On</span>'
    : '<span class="badge" style="background:rgba(100,116,139,.1);color:var(--muted);">Off</span>';
  const joinedDate = u.created_at ? u.created_at.slice(0, 10) : '—';
  const lastLogin = u.last_login ? u.last_login.slice(0, 16) : '—';
  const toggleClass = u.is_active ? 'btn-danger-sm' : 'btn-ghost';
  const toggleLabel = u.is_active ? 'Disable' : 'Enable';
  return `<tr id="user-row-${u.id}">
    <td><strong>${u.email}</strong></td>
    <td>${roleBadge}</td>
    <td>${statusBadge}</td>
    <td>${totpBadge}</td>
    <td class="text-muted">${joinedDate}</td>
    <td class="text-muted">${lastLogin}</td>
    <td><button class="btn btn-sm ${toggleClass}" onclick="toggleUser(${u.id}, ${u.is_active})">${toggleLabel}</button></td>
  </tr>`;
}

async function loadAdminData() {
  try {
    const [meRes, statsRes, usersRes] = await Promise.all([
      fetch(API_BASE + '/auth/me'),
      fetch(API_BASE + '/admin/stats'),
      fetch(API_BASE + '/admin/users')
    ]);
    if (meRes.status === 401) { window.location.href = '/login'; return; }

    const me = await meRes.json();
    document.getElementById('admin-user-email').textContent = me.email;

    if (statsRes.ok) {
      const s = await statsRes.json();
      document.getElementById('stat-total').textContent = s.total_users ?? '—';
      document.getElementById('stat-active').textContent = s.active_users ?? '—';
      document.getElementById('stat-waitlist').textContent = s.waitlist_count ?? '—';
      document.getElementById('stat-trades').textContent = s.total_trades ?? s.trades_today ?? '—';
      document.getElementById('tab-btn-users').textContent = `Users (${s.total_users ?? 0})`;
      document.getElementById('tab-btn-waitlist').textContent = `Waitlist (${s.waitlist_count ?? 0})`;
    }

    if (usersRes.ok) {
      const usersArr = await usersRes.json();
      const users = Array.isArray(usersArr) ? usersArr : (usersArr.users || []);
      const waitlistRes = await fetch(API_BASE + '/admin/waitlist');
      const waitlist = waitlistRes.ok ? await waitlistRes.json() : [];

      const tbody = document.getElementById('users-tbody');
      tbody.innerHTML = users.length
        ? users.map(userRowHtml).join('')
        : '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:2rem;">No users found.</td></tr>';

      const wtbody = document.getElementById('waitlist-tbody');
      document.getElementById('waitlist-card-title').textContent = `Beta Waitlist (${waitlist.length} signups)`;
      wtbody.innerHTML = waitlist.length
        ? waitlist.map((w, i) => `<tr>
            <td class="text-muted">${i + 1}</td>
            <td>${w.email}</td>
            <td class="text-muted">${w.created_at ? w.created_at.slice(0, 16) : '—'}</td>
            <td><button class="btn btn-sm btn-primary" onclick="promoteUser('${w.email}')">Invite</button></td>
          </tr>`).join('')
        : '<tr><td colspan="4" class="text-muted" style="text-align:center;padding:3rem;">No waitlist signups yet.</td></tr>';
    }
  } catch (e) {
    console.error('Failed to load admin data:', e);
  }
}

async function createUser(e) {
  e.preventDefault();
  const email = document.getElementById('new-email').value;
  const password = document.getElementById('new-pw').value;
  const role = document.getElementById('new-role').value;
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const res = await fetch(API_BASE + '/admin/users', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: password || undefined, role})
    });
    const d = await res.json();
    if (res.ok) {
      document.getElementById('create-ok').innerHTML =
        `User <strong>${d.email}</strong> created.<br>Temp password: <code style="font-size:.9rem;background:var(--bg);padding:.1rem .4rem;border-radius:4px;">${d.temp_password}</code>`;
      document.getElementById('create-ok').style.display = 'block';
      setTimeout(() => { closeCreateModal(); loadAdminData(); }, 4000);
    } else {
      document.getElementById('create-err').textContent = d.error;
      document.getElementById('create-err').style.display = 'block';
    }
  } catch {
    document.getElementById('create-err').textContent = 'Error creating user.';
    document.getElementById('create-err').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Create User';
}

async function toggleUser(uid, isActive) {
  const res = await fetch(API_BASE + '/admin/users/' + uid + '/toggle', {method:'POST'});
  if (res.ok) {
    showToast(isActive ? 'User disabled' : 'User enabled', 'success');
    setTimeout(loadAdminData, 800);
  }
}

function promoteUser(email) {
  openCreateModal();
  document.getElementById('new-email').value = email;
}

loadAdminData();
</script>
</body>
</html>
