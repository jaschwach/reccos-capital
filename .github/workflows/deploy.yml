name: Notify Jory to Publish

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PUSHER="${{ github.actor }}"
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT:0:7}"
          MESSAGE="${{ github.event.head_commit.message }}"
          COMPARE_URL="${{ github.event.compare }}"

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rocket: *New code pushed to Reccos Capital*\\n*By:* $PUSHER\\n*Commit:* \`$SHORT_COMMIT\` — $MESSAGE\\n*Changes:* $COMPARE_URL\\n\\n:point_right: Please <https://replit.com/@jschwach/reccos-capital|click Publish in Replit> to deploy to production.\"
            }"
